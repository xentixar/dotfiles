# ==========================================
# TMUX Configuration
# ==========================================
# Author: xentixar
# Last Updated: October 30, 2025
# Description: A modern, feature-rich tmux configuration
# ==========================================

# ==========================================
# General Settings
# ==========================================

# Set prefix to Ctrl-a (more ergonomic than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Double tap Ctrl-a to send it to the application
bind C-a send-prefix

# Enable mouse support for modern workflows
set -g mouse on

# Start window and pane numbering at 1 (human-friendly)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows sequentially after closing any of them
set -g renumber-windows on

# Increase scrollback buffer size for better history
set -g history-limit 100000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status bar every 1 second for accurate time
set -g status-interval 1

# Focus events enabled for terminals that support them
set -g focus-events on

# Enable true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Address vim mode switching delay (no delay)
set -s escape-time 0

# Increase repeat timeout
set -g repeat-time 1000

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity off

# Expect UTF-8
set -q -g status-utf8 on
setw -q -g utf8 on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# ==========================================
# Key Bindings
# ==========================================

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Configuration reloaded!"

# Edit configuration
bind e new-window -n "tmux.conf" "sh -c '\${EDITOR:-vim} ~/.config/tmux/tmux.conf && tmux source ~/.config/tmux/tmux.conf && tmux display \"✓ Configuration reloaded!\"'"

# ==========================================
# Window Management
# ==========================================

# Create new window with current path
bind c new-window -c "#{pane_current_path}"

# Switch windows using Shift-arrow without prefix
bind -n S-Left previous-window
bind -n S-Right next-window

# Move windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Kill window
bind X confirm-before -p "kill-window #W? (y/n)" kill-window

# ==========================================
# Pane Management
# ==========================================

# Split panes using | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Split panes using vim-style keys
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Switch panes using vim-like keys (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using prefix + Ctrl-hjkl
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Resize panes using prefix + arrow keys
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Toggle pane zoom
bind z resize-pane -Z

# Break pane into new window
bind b break-pane -d

# Kill pane without confirmation
bind x kill-pane

# Toggle synchronize panes
bind S setw synchronize-panes \; display "Synchronize panes: #{?synchronize-panes,ON,OFF}"

# ==========================================
# Session Management
# ==========================================

# Quick session switching
bind C-j choose-tree -Zs

# Create new session
bind C-c new-session

# Rename session
bind '$' command-prompt -I "#S" "rename-session '%%'"

# ==========================================
# Copy Mode (Vim-style)
# ==========================================

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode
bind Enter copy-mode
bind Escape copy-mode

# Copy mode vim-style selection
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi Y send-keys -X copy-pipe "xclip -in -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Paste buffer
bind p paste-buffer
bind P choose-buffer

# Paste from system clipboard
bind C-p run "xclip -out -selection clipboard | tmux load-buffer - ; tmux paste-buffer"

# ==========================================
# Utility Bindings
# ==========================================

# Clear screen and scrollback
bind C-l send-keys 'C-l' \; clear-history

# Show key bindings (default list)
bind ? list-keys

# Show custom shortcuts guide
bind / display-popup -E -w 90% -h 90% "cat ~/.config/tmux/shortcuts.txt | less -R"

# Show messages
bind m show-messages

# Clock mode
bind t clock-mode

# ==========================================
# Status Bar Configuration
# ==========================================

# Status bar position
set -g status-position top

# Status bar colors (darker background for distinction)
set -g status-style bg=colour235,fg=colour250

# Status bar justify
set -g status-justify left

# Left status bar with session info (Oh My Zsh inspired)
set -g status-left-length 50
set -g status-left "#[fg=colour232,bg=colour39,bold] ❐ #S #[fg=colour39,bg=colour240,nobold]#[fg=colour250,bg=colour240] #(whoami) #[fg=colour240,bg=colour235]#[fg=colour240,bg=colour235] "

# Right status bar with system information (Oh My Zsh inspired)
set -g status-right-length 150
set -g status-right "#[fg=colour240,bg=colour235]#[fg=colour250,bg=colour240] #{?client_prefix,#[fg=colour208] PREFIX ,}#{?pane_synchronized,#[fg=colour208] SYNC ,}%Y-%m-%d #[fg=colour39,bg=colour240]#[fg=colour232,bg=colour39,bold] %H:%M:%S "

# Window status format (inactive windows - cleaner look)
setw -g window-status-format "#[fg=colour245,bg=colour235] #I #[fg=colour250]#W#F "

# Window status format (active window - standout with powerline)
setw -g window-status-current-format "#[fg=colour235,bg=colour39]#[fg=colour232,bg=colour39,bold] #I #[fg=colour232,bg=colour39]#W#F #[fg=colour39,bg=colour235,nobold]"

# Window status separator
setw -g window-status-separator ""

# Activity window status
setw -g window-status-activity-style fg=colour154,bg=colour234,bold

# Bell window status
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# Pane border colors
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour235

# Pane border status (creates margin below status bar)
set -g pane-border-status top
set -g pane-border-format "#[fg=colour235,bg=colour235]─"

# Pane number display
set -g display-panes-active-colour colour154
set -g display-panes-colour colour238
set -g display-panes-time 2000

# Message colors
set -g message-style bg=colour154,fg=colour232,bold
set -g message-command-style bg=colour238,fg=colour154

# Clock mode color
setw -g clock-mode-colour colour154
setw -g clock-mode-style 24

# Copy mode colors
setw -g mode-style bg=colour154,fg=colour232,bold

# ==========================================
# Additional Features
# ==========================================

# Automatically set window title
setw -g automatic-rename on
set -g set-titles on
set -g set-titles-string "tmux: #S / #W"

# Don't rename windows automatically after manual rename
set -g allow-rename off

# Monitor for silence (useful for long-running commands)
bind M setw monitor-silence 30 \; display "Monitoring for silence (30s)"
bind m setw monitor-silence 0 \; display "Monitor silence: OFF"

# ==========================================
# Performance Optimizations
# ==========================================

# Already optimized with escape-time 0 and other settings above

# ==========================================
# Nested Tmux Support
# ==========================================

# Send prefix to nested tmux session with F12
bind -n F12 \
  set -g status-style bg=colour238,fg=colour244 \;\
  set -g window-status-current-style bg=colour238,fg=colour244 \;\
  set -g prefix None \;\
  display "Inner tmux mode"

bind -n S-F12 \
  set -g status-style bg=colour234,fg=colour137 \;\
  set -g window-status-current-style bg=colour31,fg=colour255,bold \;\
  set -g prefix C-a \;\
  display "Outer tmux mode"

